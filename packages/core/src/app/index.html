<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenCanva</title>
    <meta
      name="description"
      content="OpenCanva — design graphics as code on a zoomable canvas. Click any object to edit it; export to PNG, SVG, or PDF."
    />
    <meta name="theme-color" content="#f4f5f8" />
    <script>
      /* No-flash editor theme boot: light is the default; only opt into dark. */
      (function () {
        try {
          if (localStorage.getItem('ox-ui-theme') === 'dark')
            document.documentElement.setAttribute('data-ui-theme', 'dark');
        } catch (e) {}
      })();
    </script>
    <link

    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;1,600&family=Playfair+Display:ital,wght@0,500;0,700;0,900;1,600&family=Archivo+Black&family=Space+Grotesk:wght@400;500;600;700&family=Cormorant:ital,wght@0,400;0,500;0,600;1,500&family=Manrope:wght@400;500;700;800&family=Syne:wght@500;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,700;0,800;1,500&family=Outfit:wght@400;500;700;800&family=Work+Sans:ital,wght@0,400;0,500;0,700;1,400&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Sora:wght@400;600;700;800&family=Fraunces:ital,wght@0,400;0,600;0,700;0,900;1,500&family=Bodoni+Moda:ital,wght@0,400;0,500;0,700;1,500&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=Space+Mono:wght@400;700&family=JetBrains+Mono:wght@400;700;800&display=swap"
