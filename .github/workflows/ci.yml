name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Vite 7 requires Node ^20.19.0 || >=22.12.0 — keep this at/above that floor.
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (core)
        run: npm run typecheck

      - name: Typecheck (demo)
        run: npx tsc --noEmit -p apps/demo

      - name: Typecheck (init template)
        run: npx tsc --noEmit -p packages/core/template/tsconfig.json

      - name: Check committed skills/template/lockfile are in sync
        run: npm run check:sync

      - name: Validate the init template installs + typechecks in isolation
        run: node scripts/check-template-scaffold.mjs
